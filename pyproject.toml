[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "portfolyahoo"
version = "0.1.0"
description = "Transaction-based portfolio tracking with FIFO cost basis"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.12.5",
    "python-dotenv>=1.2.1",
    "rich>=14.2.0",
    "typer>=0.21.1",
    "yfinance>=1.0",
    "python-binance>=1.0.20",
    "quantstats>=0.0.81",
    "pandas>=3.0.0",
    "numpy>=2.4.1",
    "duckdb>=1.0.0",
    "crawl4ai>=0.8.0",
    "playwright>=1.58.0",
    "claude-agent-sdk>=0.1.30",
    "fear-and-greed>=0.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
]

[project.scripts]
portfolio = "portfolio_db.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["portfolio_db"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
